<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platform — JV Ventures</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600&family=Newsreader:ital,opsz,wght@1,6..72,300;1,6..72,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="platform-page">

<header class="site-header">
  <a class="logo" href="index.html"><img src="assets/jv-logo.png" alt="JV Ventures"></a>
  <nav class="site-nav">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="#ventures" class="nav-cta">Contact</a>
  </nav>
</header>

<main id="top">
  <!-- HERO -->
  <section class="act plat-hero" id="hero">
    <div class="plat-hero-bg"></div>
    <div class="plat-hero-veil"></div>
    <div class="plat-hero-inner">
      <img class="plat-wordmark" src="" alt="">
      <p class="plat-tagline"></p>
    </div>
    <div class="deck-cue plat-cue" aria-hidden="true"><span>Scroll</span><div class="cue-line"></div></div>
  </section>

  <!-- INTRO + TOTALS -->
  <section class="act plat-intro" id="intro">
    <div class="grids-head">
      <h2 class="section-title">
        <span class="line"><span class="line-inner">The</span></span>
        <span class="line"><span class="line-inner em plat-sector"></span></span>
        <span class="line"><span class="line-inner">platform</span></span>
      </h2>
      <div class="head-right">
        <p class="section-copy reveal plat-intro-copy"></p>
      </div>
    </div>
    <div class="plat-totals reveal"></div>
  </section>

  <!-- VENTURES: sticky rail + scrolling ventures -->
  <section class="act plat-ventures" id="ventures">
    <div class="ven-layout">
      <aside class="ven-rail">
        <span class="ven-rail-kicker">Inside the platform</span>
        <div class="ven-rail-name"></div>
        <ul class="ven-rail-list"></ul>
      </aside>
      <div class="ven-stream"></div>
    </div>
  </section>

  <!-- PLATFORM SWITCHER -->
  <section class="act plat-switch" id="switch">
    <h2 class="section-title"><span class="line"><span class="line-inner">Explore the <em>other platforms</em></span></span></h2>
    <div class="switch-grid"></div>
  </section>

  <!-- CLOSE -->
  <section class="act act-close plat-close" id="contact">
    <p class="close-statement">
      <span class="line"><span class="line-inner">One ecosystem.</span></span>
      <span class="line"><span class="line-inner"><em>Compounding impact.</em></span></span>
    </p>
    <a class="close-cta reveal" href="#">Partner with us<span class="arrow">→</span></a>
    <div class="close-bridge" aria-hidden="true"><img src="assets/jv-bridge-1-2048x585.png" alt=""></div>
  </section>

  <footer class="site-footer">
    <div class="foot-left">
      <img src="assets/jv-logo.png" alt="JV Ventures" class="foot-logo">
      <span>India · Dubai · Singapore</span>
    </div>
    <div class="foot-right">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="mailto:connect@jv.ventures">connect@jv.ventures</a>
    </div>
  </footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lenis@1.1.14/dist/lenis.min.js"></script>
<script src="platform.js"></script>
</body>
</html>
